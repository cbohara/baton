name: pr-checks

# TEMPLATE — copy into a project repo at .github/workflows/pr-checks.yml
#
# The INDEPENDENT gate: runs the full suite + browser e2e/visual on every PR.
# This is the ground-truth check the relay agent cannot self-report past, and what
# your branch-protection rule should require green before merge.
#
# Edit the install/test steps for your stack. Drop the `browser` job if not a web app.

on:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"      # <- your install step
      - run: pytest -q                     # full suite, incl. property-based tests

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test           # e2e + visual regression (snapshot diffs)
