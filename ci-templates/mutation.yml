name: mutation

# TEMPLATE — copy into a project repo at .github/workflows/mutation.yml
#
# Mutation testing is SLOW, so it's opt-in, not every-PR:
#   - add the `mutation` label to a PR to run it, or
#   - trigger manually from the Actions tab (workflow_dispatch).
# Surviving mutants = tests that don't actually constrain the code.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  mutation:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'mutation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"      # <- your install step (incl. mutmut)
      - run: mutmut run || true            # run mutations; don't fail the job on survivors
      - run: mutmut results                # surviving mutants → tests to strengthen
