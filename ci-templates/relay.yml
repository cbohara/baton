name: relay

# TEMPLATE — copy into a project repo at .github/workflows/relay.yml
# (Inert here in the relay repo; workflows only run from the repo they live in.)
#
# Add the label `relay` to an issue → the pipeline runs in CI and opens a PR.
# Automation mode: providing `prompt` runs immediately — no @claude mention needed.
#
# Requires: the .claude/ relay files committed into THIS project repo (a fresh CI
# runner has no ~/.claude symlink), and a CLAUDE_CODE_OAUTH_TOKEN repo secret
# (generate locally with `claude setup-token`).

on:
  issues:
    types: [labeled]

jobs:
  relay:
    if: github.event.label.name == 'relay'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the branch and commits
      pull-requests: write   # open the PR
      issues: write          # comment back on the issue
      id-token: write        # required by the default GitHub App auth path
      actions: read          # let the relay read CI results
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run relay
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/handoff ${{ github.event.issue.number }}"
          claude_args: "--max-turns 60"
          # OPTIONAL — make the relay's PR pushes trigger pr-checks.yml below.
          # Pushes with the default token do NOT trigger other workflows, so the
          # PR checks stay silent unless you pass a GitHub App token here.
          # github_token: ${{ secrets.RELAY_APP_TOKEN }}
